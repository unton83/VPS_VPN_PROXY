# Port 80 — HTTP
# Serves two purposes:
#   1. Certbot HTTP-01 challenge (/.well-known/acme-challenge/)
#   2. Serves cover website directly (port 443 is taken by telemt)
server {
    listen 80;
    server_name _;

    # Health check for Docker and setup.sh
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Let's Encrypt HTTP-01 challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Cover website
    root  /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript text/html;

    access_log /var/log/nginx/cover_access.log;
    error_log  /var/log/nginx/cover_error.log;
}
