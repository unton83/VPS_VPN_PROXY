[Definition]
# Filter for Docker nginx container logs via systemd journal
# This captures nginx authentication failures, rate limiting, and bot traffic from Docker containers
failregex = ^.*user ".*" was not found.*
            ^.*user ".*" password mismatch.*
            ^.*no user/password was provided.*
            ^.*limiting requests.*
            ^.*client: <HOST>.*"GET.*".*401.*
            ^.*client: <HOST>.*"POST.*".*401.*
            ^.*client: <HOST>.*"GET.*".*403.*
            ^.*client: <HOST>.*"POST.*".*403.*
ignoreregex = ^.*client: 127\.0\.0\.1.*
            ^.*client: ::1.*
