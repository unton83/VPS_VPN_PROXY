# 3proxy configuration for HTTP proxy with authentication
# Listen on all interfaces

# DNS settings
nserver 8.8.8.8
nserver 8.8.4.4

# Load users from password file
users $/etc/3proxy/3proxy.passwd

# Enable authentication
auth strong

# Log settings - simple logging to stdout (no pathname for Docker)
log

# HTTP proxy on port 8080 with authentication
proxy -p8080 -i0.0.0.0


